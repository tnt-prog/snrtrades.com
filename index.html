<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trends &amp; Trade — Coming Soon</title>
  <meta name="description" content="Trends & Trade — S&R Intelligent Trading System. Coming Soon."/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #2DD4BF;
      --teal-dark: #0D9488;
      --bg: #070F1A;
      --bg-2: #0A1628;
      --text: #E8F4F2;
      --text-muted: #7A9E9B;
      --border: rgba(45,212,191,0.18);
    }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Animated background grid */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(45,212,191,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45,212,191,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Glow orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(13,148,136,0.25), transparent 70%);
      top: -150px; left: -150px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(45,212,191,0.15), transparent 70%);
      bottom: -100px; right: -100px;
    }

    /* Center content */
    .wrap {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }

    .label {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(45,212,191,0.08);
      border: 1px solid rgba(45,212,191,0.22);
      color: var(--teal); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 32px;
    }
    .label::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .site-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 700; color: var(--text-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .site-name span { color: var(--teal); }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(52px, 12vw, 100px);
      font-weight: 800; line-height: 1;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #E8F4F2 30%, var(--teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: clamp(14px, 2vw, 18px);
      color: var(--text-muted); line-height: 1.7;
      max-width: 480px; margin-bottom: 48px;
    }

    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      margin: 0 auto 48px;
    }

    .footer-txt {
      position: fixed; bottom: 28px;
      font-size: 12px; color: rgba(122,158,155,0.5);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <div class="label">Stay Tuned</div>
  <div class="site-name">Trends <span>&amp;</span> Trade</div>
  <h1>Coming Soon</h1>
  <div class="divider"></div>
  <p class="tagline">We're putting the finishing touches.</p>
</div>

<div class="footer-txt">snrtrades.com &nbsp;&middot;&nbsp; &copy; 2026 Trends &amp; Trade</div>

</body>
</html>
