<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 370" width="620" height="370">
  <defs>
    <!-- Bar gradients — teal 3D -->
    <linearGradient id="barA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DD9C8"/>
      <stop offset="50%" style="stop-color:#2BB5A2"/>
      <stop offset="100%" style="stop-color:#1A8A7A"/>
    </linearGradient>
    <linearGradient id="barB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EE0CE"/>
      <stop offset="50%" style="stop-color:#2EC4AF"/>
      <stop offset="100%" style="stop-color:#1E9688"/>
    </linearGradient>
    <linearGradient id="barC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#72E8D6"/>
      <stop offset="50%" style="stop-color:#38CDB8"/>
      <stop offset="100%" style="stop-color:#229D8E"/>
    </linearGradient>
    <linearGradient id="barD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#88EEE0"/>
      <stop offset="40%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <!-- Bar face highlight -->
    <linearGradient id="barFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Orbit gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#0D9488;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2DD4BF;stop-opacity:0.5"/>
    </linearGradient>
    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="50%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>
    <!-- Dot gradient — teal sphere -->
    <radialGradient id="dotGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#88EEE0"/>
      <stop offset="60%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="barShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="rgba(13,148,136,0.25)"/>
    </filter>
    <filter id="dotShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(13,148,136,0.3)"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND (white) ── -->
  <rect width="620" height="370" fill="#FFFFFF" rx="10"/>
  <!-- Subtle off-white inner fill -->
  <rect x="6" y="6" width="608" height="358" fill="#F7FFFE" rx="8"/>

  <!-- ── CIRCUIT BOARD PATTERN (very light gray) ── -->
  <g stroke="#C8E8E4" stroke-width="0.8" fill="none" opacity="0.7">
    <!-- Top left -->
    <line x1="18" y1="40" x2="80" y2="40"/><line x1="80" y1="40" x2="80" y2="70"/>
    <line x1="18" y1="70" x2="80" y2="70"/><line x1="18" y1="100" x2="60" y2="100"/>
    <line x1="60" y1="70" x2="60" y2="130"/><line x1="18" y1="130" x2="60" y2="130"/>
    <line x1="18" y1="160" x2="50" y2="160"/><line x1="50" y1="130" x2="50" y2="190"/>
    <line x1="18" y1="190" x2="50" y2="190"/>
    <rect x="18" y="35" width="16" height="10" rx="2"/>
    <rect x="18" y="95" width="16" height="10" rx="2"/>
    <rect x="18" y="155" width="16" height="10" rx="2"/>
    <!-- Top right -->
    <line x1="540" y1="40" x2="602" y2="40"/><line x1="540" y1="40" x2="540" y2="70"/>
    <line x1="540" y1="70" x2="602" y2="70"/><line x1="560" y1="70" x2="560" y2="130"/>
    <line x1="560" y1="100" x2="602" y2="100"/><line x1="560" y1="130" x2="602" y2="130"/>
    <line x1="570" y1="130" x2="570" y2="190"/><line x1="570" y1="160" x2="602" y2="160"/>
    <line x1="570" y1="190" x2="602" y2="190"/>
    <rect x="586" y="35" width="16" height="10" rx="2"/>
    <rect x="586" y="95" width="16" height="10" rx="2"/>
    <rect x="586" y="155" width="16" height="10" rx="2"/>
    <!-- Bottom left -->
    <line x1="18" y1="280" x2="70" y2="280"/><line x1="70" y1="280" x2="70" y2="310"/>
    <line x1="18" y1="310" x2="70" y2="310"/><line x1="18" y1="340" x2="90" y2="340"/>
    <!-- Bottom right -->
    <line x1="550" y1="280" x2="602" y2="280"/><line x1="550" y1="280" x2="550" y2="310"/>
    <line x1="550" y1="310" x2="602" y2="310"/><line x1="530" y1="340" x2="602" y2="340"/>
    <!-- Top center -->
    <line x1="240" y1="18" x2="380" y2="18"/>
    <line x1="270" y1="18" x2="270" y2="36"/><line x1="350" y1="18" x2="350" y2="36"/>
    <rect x="290" y="18" width="60" height="15" rx="3"/>
  </g>
  <!-- Circuit dots -->
  <g fill="#A8D8D2" opacity="0.8">
    <circle cx="80" cy="40" r="2.5"/><circle cx="80" cy="70" r="2.5"/>
    <circle cx="60" cy="70" r="2"/><circle cx="60" cy="130" r="2"/>
    <circle cx="50" cy="130" r="2"/><circle cx="50" cy="190" r="2"/>
    <circle cx="540" cy="40" r="2.5"/><circle cx="540" cy="70" r="2.5"/>
    <circle cx="560" cy="70" r="2"/><circle cx="560" cy="130" r="2"/>
    <circle cx="570" cy="130" r="2"/><circle cx="570" cy="190" r="2"/>
    <circle cx="70" cy="280" r="2"/><circle cx="70" cy="310" r="2"/>
    <circle cx="550" cy="280" r="2"/><circle cx="550" cy="310" r="2"/>
    <circle cx="270" cy="18" r="2"/><circle cx="350" cy="18" r="2"/>
  </g>

  <!-- ── CHART GROUP (centered, upper portion) ── -->
  <g transform="translate(170, 30)" filter="url(#barShadow)">

    <!-- Baseline -->
    <line x1="25" y1="210" x2="265" y2="210" stroke="#C8E8E4" stroke-width="1.5"/>

    <!-- Bar 1 (shortest) -->
    <rect x="20" y="148" width="46" height="62" rx="4" fill="url(#barA)"/>
    <rect x="20" y="148" width="46" height="28" rx="4" fill="url(#barFace)"/>
    <!-- Bar 1 right side (3D) -->
    <polygon points="66,148 74,142 74,204 66,210" fill="#1A8A7A" opacity="0.4"/>
    <polygon points="20,148 28,142 74,142 66,148" fill="rgba(255,255,255,0.4)"/>

    <!-- Bar 2 (medium-short) -->
    <rect x="80" y="118" width="46" height="92" rx="4" fill="url(#barB)"/>
    <rect x="80" y="118" width="46" height="34" rx="4" fill="url(#barFace)"/>
    <polygon points="126,118 134,112 134,204 126,210" fill="#1E9688" opacity="0.4"/>
    <polygon points="80,118 88,112 134,112 126,118" fill="rgba(255,255,255,0.4)"/>

    <!-- Bar 3 (medium-tall) -->
    <rect x="140" y="80" width="50" height="130" rx="4" fill="url(#barC)"/>
    <rect x="140" y="80" width="50" height="40" rx="4" fill="url(#barFace)"/>
    <polygon points="190,80 199,73 199,203 190,210" fill="#229D8E" opacity="0.4"/>
    <polygon points="140,80 149,73 199,73 190,80" fill="rgba(255,255,255,0.4)"/>

    <!-- Bar 4 (tallest) -->
    <rect x="205" y="30" width="54" height="180" rx="4" fill="url(#barD)"/>
    <rect x="205" y="30" width="54" height="55" rx="4" fill="url(#barFace)"/>
    <polygon points="259,30 269,22 269,202 259,210" fill="#0D9488" opacity="0.45"/>
    <polygon points="205,30 215,22 269,22 259,30" fill="rgba(255,255,255,0.45)"/>

    <!-- ── ORBIT RINGS ── -->
    <!-- Main large orbit -->
    <ellipse cx="147" cy="130" rx="142" ry="108"
             fill="none" stroke="url(#orbitGrad)" stroke-width="2.5"
             transform="rotate(-16, 147, 130)" opacity="0.85"/>
    <!-- Secondary orbit (tighter) -->
    <ellipse cx="147" cy="130" rx="108" ry="72"
             fill="none" stroke="#2DD4BF" stroke-width="1.2"
             transform="rotate(20, 147, 130)" opacity="0.45"/>
    <!-- Smallest inner ring -->
    <ellipse cx="147" cy="130" rx="78" ry="48"
             fill="none" stroke="#0D9488" stroke-width="0.8"
             transform="rotate(-8, 147, 130)" opacity="0.25"/>

    <!-- ── TREND LINE ── -->
    <polyline points="43,138 103,106 165,72 232,26"
              fill="none" stroke="#2DD4BF" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <!-- ── TREND DOTS (teal spheres) ── -->
    <!-- Dot 1 -->
    <circle cx="43"  cy="138" r="9"  fill="url(#dotGrad)" filter="url(#dotShadow)"/>
    <circle cx="40"  cy="135" r="3"  fill="rgba(255,255,255,0.55)"/>
    <!-- Dot 2 -->
    <circle cx="103" cy="106" r="10" fill="url(#dotGrad)" filter="url(#dotShadow)"/>
    <circle cx="100" cy="103" r="3.5" fill="rgba(255,255,255,0.55)"/>
    <!-- Dot 3 -->
    <circle cx="165" cy="72"  r="11" fill="url(#dotGrad)" filter="url(#dotShadow)"/>
    <circle cx="162" cy="68"  r="4"  fill="rgba(255,255,255,0.55)"/>
    <!-- Dot 4 (largest) -->
    <circle cx="232" cy="26"  r="13" fill="url(#dotGrad)" filter="url(#dotShadow)"/>
    <circle cx="228" cy="22"  r="5"  fill="rgba(255,255,255,0.6)"/>

  </g>

  <!-- ── DIVIDER LINE ── -->
  <line x1="70" y1="262" x2="550" y2="262" stroke="#C8E8E4" stroke-width="1" opacity="0.8"/>

  <!-- ── BRAND NAME ── -->
  <text x="310" y="308"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="900"
        fill="#1A1A2E"
        text-anchor="middle"
        letter-spacing="2"
        filter="url(#textShadow)">TRENDS &amp; TRADE</text>

  <!-- ── TAGLINE ── -->
  <text x="310" y="340"
        font-family="Arial, sans-serif"
        font-size="13" font-weight="500"
        fill="#0D9488"
        text-anchor="middle"
        letter-spacing="3.5"
        opacity="0.95">WHERE TRENDS MEET SMART TRADING</text>

  <!-- Tagline underline -->
  <line x1="185" y1="349" x2="435" y2="349" stroke="#2DD4BF" stroke-width="1" opacity="0.5"/>

  <!-- ── BORDER FRAME ── -->
  <!-- Outer frame -->
  <rect x="3" y="3" width="614" height="364" fill="none" rx="10"
        stroke="url(#borderGrad)" stroke-width="4"/>
  <!-- Inner frame -->
  <rect x="10" y="10" width="600" height="350" fill="none" rx="8"
        stroke="#2DD4BF" stroke-width="1" opacity="0.35"/>

  <!-- Corner accent (bottom right) -->
  <polygon points="608,356 618,366 608,376 598,366" fill="#2DD4BF" opacity="0.5"/>

</svg>
